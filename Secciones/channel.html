<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZ TV - Ver Canal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ffffff;
            --background-color: #000000;
        }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(45deg, var(--background-color), #1a1a1a);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 70px;
        }
        .header {
            text-align: center;
            color: var(--primary-color);
            padding: 1rem 0;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color);
            }
            to {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
            }
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .channel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .channel-info {
            text-align: center;
            margin-bottom: 10px;
            color: var(--secondary-color);
        }
        .channel-info h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        .channel-info img {
            max-width: 200px;
            margin-bottom: 10px;
        }
        .iframe-container {
            width: 100%;
            padding-top: 56.25%; /* Relación de aspecto 16:9 */
            position: relative;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            border-radius: 15px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
            margin-bottom: 0;
        }
        .back-button {
            display: none;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -2px 10px rgba(0, 255, 255, 0.2);
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--secondary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .nav-item.active {
            color: var(--primary-color);
        }
        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .nav-item span {
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            .channel-info h2 {
                font-size: 1.5rem;
            }
            .back-button {
                top: 10px;
                left: 10px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            .header p {
                font-size: 0.9rem;
            }
            .channel-info h2 {
                font-size: 1.2rem;
            }
            .channel-info p {
                font-size: 0.9rem;
            }
            .back-button {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
        @media (max-width: 320px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .header p {
                font-size: 0.8rem;
            }
            .channel-info h2 {
                font-size: 1rem;
            }
            .channel-info p {
                font-size: 0.8rem;
            }
            .back-button {
                padding: 4px 8px;
                font-size: 10px;
            }
        }
        @media (min-width: 768px) {
            .channel-container {
                padding: 40px;
            }
            .iframe-container {
                width: 90%;
            }
        }
        @media (min-width: 1024px) {
            .iframe-container {
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HRZ TV</h1>
        <p>Ver Canal</p>
    </div>
    <div class="channel-container" id="channel-container">
        <!-- La información del canal y el iframe se cargarán aquí dinámicamente -->
    </div>
    <nav class="bottom-nav">
        <a href="Peliculas.html" class="nav-item">
            <i class="fas fa-film"></i>
            <span>Películas</span>
        </a>
        <a href="Series.html" class="nav-item">
            <i class="fas fa-tv"></i>
            <span>Series</span>
        </a>
        <a href="TV-Online.html" class="nav-item active">
            <i class="fas fa-broadcast-tower"></i>
            <span>TV Online</span>
        </a>
    </nav>
    <footer>
        <p>&copy; 2024 Tecnologia HRZ. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Función para prevenir redirecciones
        function prevenirRedirecciones() {
            // Prevenir que los iframes redirijan la página principal
            const iframes = document.getElementsByTagName('iframe');
            for (let iframe of iframes) {
                iframe.sandbox = "allow-scripts allow-same-origin allow-forms";
                
                // Intentar prevenir que el iframe cambie el top-level window
                iframe.addEventListener('load', function() {
                    try {
                        iframe.contentWindow.onbeforeunload = function() {
                            return false;
                        };
                    } catch (e) {
                        // Error de seguridad por cross-origin - es esperado
                    }
                });
            }

            // Prevenir redirecciones de ventana principal
            window.onbeforeunload = function(e) {
                const currentTime = new Date().getTime();
                const timeSinceLoad = currentTime - window.performance.timing.navigationStart;
                
                // Permitir redirecciones internas del sitio
                if (e && e.target && e.target.location && e.target.location.href) {
                    const newUrl = e.target.location.href;
                    if (newUrl.includes('HRZ') || newUrl.includes('Secciones')) {
                        return;
                    }
                }
                
                // Bloquear redirecciones externas
                if (timeSinceLoad > 1000) { // Ignorar la carga inicial
                    e.preventDefault();
                    return false;
                }
            };

            // Bloquear popups
            window.addEventListener('click', function(e) {
                window.onbeforeunload = null;
                setTimeout(function() {
                    window.onbeforeunload = function() { return false; };
                }, 0);
            }, true);

            // Sobrescribir funciones comunes de redirección
            window.open = function() { return null; };
            window.alert = function() { return null; };
            window._blank = null;
        }

        window.addEventListener('load', () => {
            const canalSeleccionado = JSON.parse(localStorage.getItem('canalSeleccionado'));
            if (canalSeleccionado) {
                const channelContainer = document.getElementById('channel-container');
                channelContainer.innerHTML = `
                    <div class="channel-info">
                        <img src="${canalSeleccionado.logo}" alt="${canalSeleccionado.nombre}">
                        <h2>${canalSeleccionado.nombre}</h2>
                        <p>${canalSeleccionado.descripcion}</p>
                    </div>
                    <div class="iframe-container">
                        <iframe 
                            src="${canalSeleccionado.url_stream}" 
                            allowfullscreen
                            sandbox="allow-scripts allow-same-origin allow-forms"
                        ></iframe>
                    </div>
                `;
                
                // Activar la protección contra redirecciones
                prevenirRedirecciones();
            } else {
                alert('No se ha seleccionado ningún canal');
                window.location.href = 'TV-Online.html';
            }
        });

        // Observador de mutaciones para mantener la protección en elementos dinámicos
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.addedNodes.length) {
                    prevenirRedirecciones();
                }
            });
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
    </script>
</body>
</html>
