<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZ TV - Próximos Lanzamientos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ffffff;
            --background-color: #000000;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(45deg, var(--background-color), #1a1a1a);
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            padding-bottom: 70px;
            padding-top: 80px;
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0.9) 0%,
                rgba(0, 0, 0, 0.8) 50%,
                rgba(0, 0, 0, 0) 100%);
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        .top-header.scrolled {
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin: 0;
            background: linear-gradient(45deg, var(--primary-color), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .content-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.7);
            height: 300px;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.1);
            aspect-ratio: 2/3;
        }

        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.2);
            border-color: var(--primary-color);
        }

        .content-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .content-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.95) 0%,
                rgba(0, 0, 0, 0.7) 70%,
                transparent 100%
            );
            color: var(--secondary-color);
        }

        .content-title {
            font-size: 1.1rem;
            margin: 0 0 0.3rem 0;
            color: var(--primary-color);
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .content-details {
            font-size: 0.85rem;
            opacity: 0.9;
            margin: 0.2rem 0;
        }

        .coming-soon-badge {
            position: absolute;
            top: 1rem;
            right: 0;
            background: linear-gradient(45deg, #ff0000, #ff6b6b);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 4px 0 0 4px;
            font-size: 0.7rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255, 0, 0, 0.3);
            z-index: 2;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .type-badge {
            position: absolute;
            bottom: 25%;
            left: 0;
            background: linear-gradient(45deg, var(--primary-color), #00cccc);
            color: black;
            padding: 0.4rem 1rem;
            border-radius: 0 4px 4px 0;
            font-size: 0.7rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 255, 255, 0.3);
            z-index: 2;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Overlay sutil */
        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 0, 0, 0.8) 100%
            );
            z-index: 1;
        }

        /* Ajustes específicos para móviles */
        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.8rem;
                padding: 0.8rem;
            }

            .content-card {
                height: auto;
            }
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 480px) {
            .content-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Ajustes para tablets */
        @media (min-width: 769px) and (max-width: 1024px) {
            .content-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .content-card {
                height: 320px;
            }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -2px 10px rgba(0, 255, 255, 0.2);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--secondary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .nav-item span {
            font-size: 0.8rem;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
            margin-bottom: 70px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            position: relative;
            background: linear-gradient(135deg, #1a1a1a, #000000);
            padding: 25px;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            animation: slideUp 0.4s ease;
            margin: 0;
            max-height: 90vh;
            overflow-y: auto;
            color: var(--secondary-color);
        }

        .modal-header {
            border-bottom: 2px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-title {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .modal-body {
            color: var(--secondary-color);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .modal-body strong {
            color: var(--primary-color);
        }

        .modal-footer {
            margin-top: 20px;
            text-align: right;
        }

        .modal-button {
            background: linear-gradient(45deg, var(--primary-color), #00cccc);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
            background: linear-gradient(45deg, #00cccc, var(--primary-color));
        }

        /* Estilo para el scroll del modal */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: #00cccc;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                transform: translateY(20px); 
                opacity: 0; 
            }
            to { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="top-header">
            <div class="header-content">
                <div class="logo-container">
                    <h1>HRZ TV</h1>
                </div>
            </div>
        </div>

        <div class="content-grid" id="content-grid">
            <!-- El contenido se cargará dinámicamente aquí -->
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="Peliculas.html" class="nav-item">
            <i class="fas fa-film"></i>
            <span>Películas</span>
        </a>
        <a href="Series.html" class="nav-item">
            <i class="fas fa-tv"></i>
            <span>Series</span>
        </a>
        <a href="TV-Online.html" class="nav-item">
            <i class="fas fa-broadcast-tower"></i>
            <span>TV Online</span>
        </a>
        <a href="Proximos.html" class="nav-item active">
            <i class="fas fa-calendar-alt"></i>
            <span>Próximos</span>
        </a>
    </nav>

    <footer>
        <p>&copy; 2024 Tecnologia HRZ. Todos los derechos reservados.</p>
    </footer>

    <script>
        let contenidoProximo = [];

        async function cargarContenido() {
            try {
                const [peliculasResponse, seriesResponse] = await Promise.all([
                    fetch('../DataBase/peliculas.json'),
                    fetch('../DataBase/series.json')
                ]);

                const peliculasData = await peliculasResponse.json();
                const seriesData = await seriesResponse.json();

                // Filtrar contenido no disponible
                const peliculasProximas = peliculasData.peliculas
                    .filter(pelicula => !pelicula.disponible)
                    .map(pelicula => ({...pelicula, tipo: 'Película'}));

                const seriesProximas = seriesData.series
                    .filter(serie => !serie.disponible)
                    .map(serie => ({...serie, tipo: 'Serie'}));

                // Combinar y mostrar el contenido
                contenidoProximo = [...peliculasProximas, ...seriesProximas];
                mostrarContenido(contenidoProximo);
            } catch (error) {
                console.error('Error cargando el contenido:', error);
            }
        }

        function mostrarContenido(contenido) {
            const contentGrid = document.getElementById('content-grid');
            contentGrid.innerHTML = '';

            contenido.forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';

                card.innerHTML = `
                    <div class="coming-soon-badge">PRÓXIMAMENTE</div>
                    <div class="type-badge">${item.tipo}</div>
                    <img src="${item.imagen}" alt="${item.titulo}" class="content-image">
                    <div class="content-info">
                        <h3 class="content-title">${item.titulo}</h3>
                    </div>
                `;

                card.addEventListener('click', () => {
                    mostrarDetalles(item);
                });
                
                contentGrid.appendChild(card);
            });
        }

        function mostrarDetalles(item) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title">${item.titulo}</h2>
                    </div>
                    <div class="modal-body">
                        <div style="text-align: center;">
                            <img src="${item.imagen}" alt="${item.titulo}" 
                                style="width: 200px; height: 300px; object-fit: cover; 
                                border-radius: 10px; margin-bottom: 15px; 
                                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);">
                        </div>
                        <p><strong>Año:</strong> ${item.año}</p>
                        ${item.genero ? `<p><strong>Géneros:</strong> ${item.genero.join(', ')}</p>` : ''}
                        <p><strong>Descripción:</strong></p>
                        <p>${item.descripcion || 'No hay descripción disponible.'}</p>
                    </div>
                    <div class="modal-footer">
                        <button class="modal-button">Entendido</button>
                    </div>
                </div>
            `;

            // Agregar el modal al body
            document.body.appendChild(modal);

            // Manejar el cierre del modal
            const cerrarModal = () => {
                modal.style.opacity = '0';
                document.body.style.overflow = 'auto';
                setTimeout(() => {
                    document.body.removeChild(modal);
                }, 300);
            };

            // Event listeners para cerrar
            modal.querySelector('.modal-button').addEventListener('click', cerrarModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) cerrarModal();
            });

            // Prevenir que el scroll del body funcione cuando el modal está abierto
            document.body.style.overflow = 'hidden';
        }

        // Efecto de scroll en el header
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.top-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Cargar contenido al iniciar
        window.addEventListener('load', cargarContenido);
    </script>
</body>
</html>
