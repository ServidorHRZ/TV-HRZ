<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZ TV - Series</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ffffff;
            --background-color: #000000;
        }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(45deg, var(--background-color), #1a1a1a);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header {
            text-align: center;
            color: var(--primary-color);
            padding: 2rem 0;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color);
            }
            to {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
            }
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .series-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 10px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .series-card {
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--primary-color);
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .series-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.95) 0%,
                rgba(0, 0, 0, 0.7) 70%,
                transparent 100%
            );
            padding: 8px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .series-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .series-card:hover img {
            transform: scale(1.05);
        }
        .series-info h3 {
            color: var(--secondary-color);
            margin: 0;
            font-size: 1rem;
        }
        .series-info p {
            color: var(--primary-color);
            margin: 5px 0 0;
            font-size: 0.8rem;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 3rem;
            }
            .series-info {
                padding: 6px;
                background: linear-gradient(
                    to top,
                    rgba(0, 0, 0, 0.95) 0%,
                    rgba(0, 0, 0, 0.7) 70%,
                    transparent 100%
                );
            }
            
            .series-info h3 {
                font-size: 0.75rem;
                margin: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            .series-info p {
                font-size: 0.65rem;
                margin: 2px 0 0;
                opacity: 0.8;
            }
            
            .new-badge {
                padding: 2px 6px;
                font-size: 0.6rem;
                top: 4px;
                right: 4px;
            }
        }

        .search-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 8%;
            max-width: 160px;
            min-width: 140px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            padding: 6px 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
            z-index: 1000;
        }

        #search-input {
            width: calc(100% - 25px);
            background: transparent;
            border: none;
            padding: 6px;
            font-size: 13px;
            color: var(--secondary-color);
            outline: none;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .search-close-btn {
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 30px;
            transition: all 0.3s ease;
        }

        .search-close-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .search-container:hover {
            border-color: #fff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }

        /* Estilos para el mensaje de no resultados */
        .no-results-message {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 50vh;
            margin: 0 auto;
            position: relative;
        }

        .no-results-content {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--primary-color);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            width: 90%;
            max-width: 300px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .no-results-icon {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        .no-results-title {
            color: var(--secondary-color);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .no-results-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        /* Media queries para el buscador */
        @media (max-width: 1200px) {
            .search-container {
                width: 15%;
            }
        }

        @media (max-width: 768px) {
            .series-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                padding: 10px;
            }

            .series-card {
                width: 100%;
                aspect-ratio: 2/3;
                border-width: 1px;
            }

            .series-info {
                padding: 6px;
                background: linear-gradient(
                    to top,
                    rgba(0, 0, 0, 0.95) 0%,
                    rgba(0, 0, 0, 0.7) 70%,
                    transparent 100%
                );
            }

            .series-info h3 {
                font-size: 0.75rem;
                margin: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .series-info p {
                font-size: 0.65rem;
                margin: 2px 0 0;
                opacity: 0.8;
            }

            .new-badge {
                padding: 2px 6px;
                font-size: 0.6rem;
                top: 4px;
                right: 4px;
            }

            .search-container {
                width: 70%;
                max-width: none;
            }

            .logo-container h1 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .series-container {
                gap: 6px;
                padding: 8px;
            }

            .search-container {
                width: 85%;
            }
        }

        @media (max-width: 360px) {
            .series-container {
                gap: 4px;
                padding: 6px;
            }
        }

        /* Estilos para el header y buscador en el header */
        .header-search {
            display: flex;
            align-items: center;
        }

        .search-toggle {
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        .search-toggle:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .header-search-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgb(0, 0, 0);
            padding: 1rem;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 1001;
            display: flex;
            align-items: center;
        }

        .header-search-container.active {
            transform: translateY(0);
        }

        .header-search-container input {
            flex: 1;
            padding: 0.8rem;
            font-size: 1rem;
            border: 2px solid var(--primary-color);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--secondary-color);
            margin-right: 1rem;
        }

        .back-button {
            display: none;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -2px 10px rgba(0, 255, 255, 0.2);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--secondary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .nav-item span {
            font-size: 0.8rem;
        }

        footer {
            margin-bottom: 70px;
        }

        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff0000;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgb(0, 0, 0);
            padding: 0.5rem 0;
            transition: all 0.3s ease;
        }

        .top-header.scrolled {
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin: 0;
            background: linear-gradient(45deg, var(--primary-color), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .search-wrapper {
            position: relative;
            margin-top: 70px;
            padding: 1.5rem;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.7), 
                rgba(0,0,0,0.3),
                transparent);
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        #search-input {
            width: 100%;
            padding: 0.8rem 2.5rem 0.8rem 1rem;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.85);
            color: var(--secondary-color);
        }

        #search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
            width: 100%;
        }

        #search-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        #search-button:hover {
            color: #fff;
            transform: translateY(-50%) scale(1.1);
        }

        @media (max-width: 768px) {
            .logo-container h1 {
                font-size: 1.5rem;
            }
        }

        /* Estilos mejorados para el carrusel de anuncios */
        .announcements-carousel {
            position: relative;
            width: 100%;
            max-width: 1400px;
            margin: 70px auto 10px;
            overflow: hidden;
            border-radius: 10px;
            z-index: 1;
            height: 400px; /* Altura fija para el banner */
        }

        .announcements-container {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
        }

        .announcement-slide {
            min-width: 100%;
            position: relative;
            height: 100%;
        }

        .announcement-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .announcement-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.95) 0%,
                rgba(0, 0, 0, 0.8) 40%,
                rgba(0, 0, 0, 0.4) 80%,
                transparent 100%
            );
            color: var(--secondary-color);
            z-index: 2;
        }

        .announcement-title {
            font-size: 3.5rem;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(45deg, var(--primary-color), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .announcement-subtitle {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .announcement-description {
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.9;
            max-width: 600px;
            line-height: 1.6;
        }

        .announcement-date {
            font-size: 1.2rem;
            color: var(--primary-color);
            font-weight: bold;
            display: inline-block;
            padding: 8px 16px;
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.5);
        }

        .carousel-indicators {
            position: absolute;
            bottom: 20px;
            right: 40px;
            display: flex;
            gap: 10px;
            z-index: 3;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--primary-color);
        }

        .indicator.active {
            background: var(--primary-color);
            transform: scale(1.2);
        }

        /* Animación de entrada para los slides */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .announcement-slide {
            animation: fadeIn 0.5s ease-out;
        }

        /* Mejoras responsive */
        @media (max-width: 768px) {
            .announcements-carousel {
                height: 300px;
            }

            .announcement-content {
                padding: 20px;
            }

            .announcement-title {
                font-size: 2rem;
            }

            .announcement-subtitle {
                font-size: 1.2rem;
            }

            .announcement-description {
                font-size: 0.9rem;
                margin-bottom: 15px;
            }

            .announcement-date {
                font-size: 1rem;
                padding: 5px 10px;
            }

            .carousel-buttons {
                padding: 0 10px;
            }

            .carousel-button {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }

        /* Efecto de zoom suave en la imagen de fondo */
        .announcement-image {
            transition: transform 6s ease;
        }

        .announcement-slide.active .announcement-image {
            transform: scale(1.1);
        }

        .announcement-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .ver-ahora-btn {
            background: var(--primary-color);
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ver-ahora-btn:hover {
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .ver-ahora-btn i {
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .ver-ahora-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
            
            .announcement-info {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="header-content">
            <div class="logo-container">
                <h1>HRZ TV</h1>
            </div>
            <div class="header-search">
                <button class="search-toggle" id="searchToggle">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
        <div class="header-search-container" id="headerSearch">
            <input type="text" id="search-input" placeholder="Buscar películas, series y más...">
            <button class="search-toggle" id="searchClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <div class="announcements-carousel">
        <div class="announcements-container" id="announcementsContainer">
            <!-- Los anuncios se cargarán aquí dinámicamente -->
        </div>
        <div class="carousel-indicators" id="carouselIndicators">
            <!-- Los indicadores se generarán dinámicamente -->
        </div>
    </div>

    <div class="series-container" id="series-container">
        <!-- Las series se cargarán aquí dinámicamente -->
    </div>
    <nav class="bottom-nav">
        <a href="Peliculas.html" class="nav-item">
            <i class="fas fa-film"></i>
            <span>Películas</span>
        </a>
        <a href="Series.html" class="nav-item active">
            <i class="fas fa-tv"></i>
            <span>Series</span>
        </a>
        <a href="TV-Online.html" class="nav-item">
            <i class="fas fa-broadcast-tower"></i>
            <span>TV Online</span>
        </a>
        <a href="Proximos.html" class="nav-item">
            <i class="fas fa-calendar-alt"></i>
            <span>Próximos</span>
        </a>
    </nav>
    <footer>
        <p>&copy; 2024 Tecnologia HRZ. Todos los derechos reservados.</p>
    </footer>

    <script>
        let todasLasSeries = []; // Variable global para almacenar todas las series

        function cargarSeries() {
            fetch('../DataBase/series.json')
                .then(response => response.json())
                .then(data => {
                    todasLasSeries = data.series.filter(serie => serie.disponible);
                    mostrarSeries(todasLasSeries);
                })
                .catch(error => console.error('Error cargando las series:', error));
        }

        function mostrarSeries(seriesFiltradas) {
            const seriesContainer = document.getElementById('series-container');
            seriesContainer.innerHTML = '';

            seriesFiltradas.forEach(serie => {
                const seriesCard = document.createElement('div');
                seriesCard.className = 'series-card';
                
                const newBadgeHTML = serie.nuevo ? '<div class="new-badge">NUEVO</div>' : '';
                
                seriesCard.innerHTML = `
                    ${newBadgeHTML}
                    <img src="${serie.imagen}" alt="${serie.titulo}">
                    <div class="series-info">
                        <h3>${serie.titulo}</h3>
                        <p>Temporadas: ${serie.temporadas.length}</p>
                    </div>
                `;
                
                seriesCard.addEventListener('click', () => {
                    if (serie.disponible) {
                        localStorage.setItem('serieSeleccionada', JSON.stringify(serie));
                        window.location.href = 'serie.html';
                    } else {
                        mostrarMensajeNoDisponible();
                    }
                });
                
                seriesContainer.appendChild(seriesCard);
            });
        }

        function searchSeries(searchTerm) {
            searchTerm = searchTerm.toLowerCase().trim();
            
            if (searchTerm === '') {
                mostrarSeries(todasLasSeries);
                return;
            }

            const seriesFiltradas = todasLasSeries.filter(serie => {
                const titulo = serie.titulo.toLowerCase();
                return titulo.includes(searchTerm);
            });

            mostrarSeries(seriesFiltradas);
        }

        // Event listeners
        window.addEventListener('load', cargarSeries);

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchSeries(e.target.value);
        });

        document.getElementById('search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Previene el comportamiento por defecto del Enter
                searchSeries(e.target.value);
            }
        });

        // Efecto de scroll en el header
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.top-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Agrega esta función después del script existente
        function mostrarMensajeNoDisponible() {
            // Verificar si ya existe un modal
            const modalExistente = document.querySelector('.modal-no-disponible');
            if (modalExistente) {
                return; // Si ya existe un modal, no crear otro
            }

            const modal = document.createElement('div');
            modal.className = 'modal-no-disponible'; // Agregar clase para identificación
            modal.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.9);
                padding: 20px;
                border: 2px solid var(--primary-color);
                border-radius: 10px;
                color: var(--secondary-color);
                text-align: center;
                z-index: 1000;
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            `;
            
            modal.innerHTML = `
                <h3 style="color: var(--primary-color); margin-bottom: 15px;">Contenido No Disponible</h3>
                <p>Este contenido estará disponible próximamente.</p>
                <p>¡Intenta más tarde!</p>
                <button onclick="this.parentElement.remove()" style="
                    margin-top: 15px;
                    padding: 8px 16px;
                    background: var(--primary-color);
                    border: none;
                    border-radius: 5px;
                    color: black;
                    cursor: pointer;
                ">Aceptar</button>
            `;
            
            document.body.appendChild(modal);
        }

        // Agregar el código para el manejo del buscador en el header
        const searchToggle = document.getElementById('searchToggle');
        const searchClose = document.getElementById('searchClose');
        const headerSearch = document.getElementById('headerSearch');
        const searchInput = document.getElementById('search-input');

        searchToggle.addEventListener('click', () => {
            headerSearch.classList.add('active');
            searchInput.focus();
        });

        searchClose.addEventListener('click', () => {
            headerSearch.classList.remove('active');
            searchInput.value = '';
            mostrarSeries(todasLasSeries);
        });

        // Carrusel de anuncios
        let currentSlide = 0;
        let announcements = [];

        function cargarAnuncios() {
            fetch('../DataBase/announcements.json')
                .then(response => response.json())
                .then(data => {
                    announcements = data.announcements;
                    mostrarAnuncios();
                    setupIndicators();
                    startAutoSlide();
                })
                .catch(error => console.error('Error cargando los anuncios:', error));
        }

        function mostrarAnuncios() {
            const container = document.getElementById('announcementsContainer');
            container.innerHTML = '';
            
            announcements.forEach(announcement => {
                const slide = document.createElement('div');
                slide.className = 'announcement-slide';
                
                // Agregar botón "Ver ahora" solo si está disponible
                const botonHTML = announcement.disponible ? 
                    `<button class="ver-ahora-btn" onclick="verSerie(${announcement.serieId})">
                        Ver ahora <i class="fas fa-play-circle"></i>
                    </button>` : '';
                
                slide.innerHTML = `
                    <img src="${announcement.imagen}" alt="${announcement.titulo}" class="announcement-image">
                    <div class="announcement-content">
                        <h2 class="announcement-title">${announcement.titulo}</h2>
                        <h3 class="announcement-subtitle">${announcement.subtitulo}</h3>
                        <p class="announcement-description">${announcement.descripcion}</p>
                        <div class="announcement-info">
                            <div class="announcement-date">${announcement.fecha}</div>
                            ${botonHTML}
                        </div>
                    </div>
                `;
                container.appendChild(slide);
            });
            
            updateSlidePosition();
        }

        function setupIndicators() {
            const indicators = document.getElementById('carouselIndicators');
            indicators.innerHTML = '';
            
            announcements.forEach((_, index) => {
                const indicator = document.createElement('div');
                indicator.className = `indicator ${index === currentSlide ? 'active' : ''}`;
                indicator.addEventListener('click', () => goToSlide(index));
                indicators.appendChild(indicator);
            });
        }

        function updateSlidePosition() {
            const container = document.getElementById('announcementsContainer');
            const slides = document.querySelectorAll('.announcement-slide');
            
            slides.forEach((slide, index) => {
                slide.classList.remove('active');
            });
            
            container.style.transform = `translateX(-${currentSlide * 100}%)`;
            slides[currentSlide].classList.add('active');
            
            const indicators = document.querySelectorAll('.indicator');
            indicators.forEach((indicator, index) => {
                indicator.classList.toggle('active', index === currentSlide);
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % announcements.length;
            updateSlidePosition();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + announcements.length) % announcements.length;
            updateSlidePosition();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateSlidePosition();
        }

        let autoSlideInterval;

        function startAutoSlide() {
            autoSlideInterval = setInterval(() => {
                const nextSlideIndex = (currentSlide + 1) % announcements.length;
                goToSlide(nextSlideIndex);
            }, 5000);
        }

        function stopAutoSlide() {
            clearInterval(autoSlideInterval);
        }

        // Cargar anuncios cuando se carga la página
        window.addEventListener('load', cargarAnuncios);

        // Añadir efecto de hover para pausar el carrusel
        document.querySelector('.announcements-carousel').addEventListener('mouseenter', () => {
            stopAutoSlide();
        });

        document.querySelector('.announcements-carousel').addEventListener('mouseleave', () => {
            startAutoSlide();
        });

        // Agregar esta nueva función
        function verSerie(serieId) {
            // Cargar el archivo series.json
            fetch('../DataBase/series.json')
                .then(response => response.json())
                .then(data => {
                    // Buscar la serie por su ID
                    const serie = data.series.find(s => s.id === serieId);
                    if (serie) {
                        // Guardar la serie seleccionada en localStorage
                        localStorage.setItem('serieSeleccionada', JSON.stringify(serie));
                        // Redirigir a la página de la serie
                        window.location.href = 'serie.html';
                    }
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
