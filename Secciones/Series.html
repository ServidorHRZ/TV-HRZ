<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZ TV - Series</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ffffff;
            --background-color: #000000;
        }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(45deg, var(--background-color), #1a1a1a);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header {
            text-align: center;
            color: var(--primary-color);
            padding: 2rem 0;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color);
            }
            to {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
            }
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .series-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .series-card {
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--primary-color);
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .series-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.95) 0%,
                rgba(0, 0, 0, 0.7) 70%,
                transparent 100%
            );
            padding: 8px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .series-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .series-card:hover img {
            transform: scale(1.05);
        }
        .series-info h3 {
            color: var(--secondary-color);
            margin: 0;
            font-size: 1rem;
        }
        .series-info p {
            color: var(--primary-color);
            margin: 5px 0 0;
            font-size: 0.8rem;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 3rem;
            }
            .series-info {
                padding: 6px;
                background: linear-gradient(
                    to top,
                    rgba(0, 0, 0, 0.95) 0%,
                    rgba(0, 0, 0, 0.7) 70%,
                    transparent 100%
                );
            }
            
            .series-info h3 {
                font-size: 0.75rem;
                margin: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            .series-info p {
                font-size: 0.65rem;
                margin: 2px 0 0;
                opacity: 0.8;
            }
            
            .new-badge {
                padding: 2px 6px;
                font-size: 0.6rem;
                top: 4px;
                right: 4px;
            }
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        #search-input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid var(--primary-color);
            border-radius: 5px 0 0 5px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--secondary-color);
            width: 300px;
        }

        #search-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: var(--primary-color);
            color: var(--background-color);
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #search-button:hover {
            background-color: var(--secondary-color);
        }

        .back-button {
            display: none;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -2px 10px rgba(0, 255, 255, 0.2);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--secondary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .nav-item span {
            font-size: 0.8rem;
        }

        footer {
            margin-bottom: 70px;
        }

        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff0000;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0.9) 0%,
                rgba(0, 0, 0, 0.8) 50%,
                rgba(0, 0, 0, 0) 100%);
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        .top-header.scrolled {
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin: 0;
            background: linear-gradient(45deg, var(--primary-color), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .search-wrapper {
            position: relative;
            margin-top: 80px;
            padding: 2rem;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.8), 
                rgba(0,0,0,0.4),
                transparent);
        }

        .search-container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 1rem 3.5rem 1rem 1.5rem;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.75);
            color: var(--secondary-color);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #search-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .series-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                padding: 10px;
            }
            
            .series-card {
                width: 100%;
                aspect-ratio: 2/3;
                border-width: 1px;
            }
        }

        @media (max-width: 480px) {
            .series-container {
                gap: 6px;
                padding: 8px;
            }
        }

        @media (max-width: 360px) {
            .series-container {
                gap: 4px;
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="header-content">
            <div class="logo-container">
                <h1>HRZ TV</h1>
            </div>
            <div class="nav-icons">
                <!-- Aquí puedes agregar íconos adicionales si lo deseas -->
            </div>
        </div>
    </div>

    <div class="search-wrapper">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar series...">
            <button id="search-button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <div class="series-container" id="series-container">
        <!-- Las series se cargarán aquí dinámicamente -->
    </div>
    <nav class="bottom-nav">
        <a href="Peliculas.html" class="nav-item">
            <i class="fas fa-film"></i>
            <span>Películas</span>
        </a>
        <a href="Series.html" class="nav-item active">
            <i class="fas fa-tv"></i>
            <span>Series</span>
        </a>
        <a href="TV-Online.html" class="nav-item">
            <i class="fas fa-broadcast-tower"></i>
            <span>TV Online</span>
        </a>
    </nav>
    <footer>
        <p>&copy; 2024 Tecnologia HRZ. Todos los derechos reservados.</p>
    </footer>

    <script>
        let todasLasSeries = []; // Variable global para almacenar todas las series

        function cargarSeries() {
            fetch('../DataBase/series.json')
                .then(response => response.json())
                .then(data => {
                    todasLasSeries = data.series;
                    mostrarSeries(todasLasSeries);
                })
                .catch(error => console.error('Error cargando las series:', error));
        }

        function mostrarSeries(seriesFiltradas) {
            const seriesContainer = document.getElementById('series-container');
            seriesContainer.innerHTML = '';

            seriesFiltradas.forEach(serie => {
                const seriesCard = document.createElement('div');
                seriesCard.className = 'series-card';
                
                const newBadgeHTML = serie.nuevo ? '<div class="new-badge">NUEVO</div>' : '';
                
                seriesCard.innerHTML = `
                    ${newBadgeHTML}
                    <img src="${serie.imagen}" alt="${serie.titulo}">
                    <div class="series-info">
                        <h3>${serie.titulo}</h3>
                        <p>Temporadas: ${serie.temporadas.length}</p>
                    </div>
                `;
                
                seriesCard.addEventListener('click', () => {
                    if (serie.disponible) {
                        localStorage.setItem('serieSeleccionada', JSON.stringify(serie));
                        window.location.href = 'serie.html';
                    } else {
                        mostrarMensajeNoDisponible();
                    }
                });
                
                seriesContainer.appendChild(seriesCard);
            });
        }

        function searchSeries(searchTerm) {
            searchTerm = searchTerm.toLowerCase().trim();
            
            if (searchTerm === '') {
                mostrarSeries(todasLasSeries);
                return;
            }

            const seriesFiltradas = todasLasSeries.filter(serie => {
                const titulo = serie.titulo.toLowerCase();
                return titulo.includes(searchTerm);
            });

            mostrarSeries(seriesFiltradas);
        }

        // Event listeners
        window.addEventListener('load', cargarSeries);

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchSeries(e.target.value);
        });

        // Efecto de scroll en el header
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.top-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Agrega esta función después del script existente
        function mostrarMensajeNoDisponible() {
            // Verificar si ya existe un modal
            const modalExistente = document.querySelector('.modal-no-disponible');
            if (modalExistente) {
                return; // Si ya existe un modal, no crear otro
            }

            const modal = document.createElement('div');
            modal.className = 'modal-no-disponible'; // Agregar clase para identificación
            modal.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.9);
                padding: 20px;
                border: 2px solid var(--primary-color);
                border-radius: 10px;
                color: var(--secondary-color);
                text-align: center;
                z-index: 1000;
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            `;
            
            modal.innerHTML = `
                <h3 style="color: var(--primary-color); margin-bottom: 15px;">Contenido No Disponible</h3>
                <p>Este contenido estará disponible próximamente.</p>
                <p>¡Intenta más tarde!</p>
                <button onclick="this.parentElement.remove()" style="
                    margin-top: 15px;
                    padding: 8px 16px;
                    background: var(--primary-color);
                    border: none;
                    border-radius: 5px;
                    color: black;
                    cursor: pointer;
                ">Aceptar</button>
            `;
            
            document.body.appendChild(modal);
        }
    </script>
</body>
</html>
