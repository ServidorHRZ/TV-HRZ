<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZ TV - Reproducir Película</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ffffff;
            --background-color: #000000;
        }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(45deg, var(--background-color), #1a1a1a);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header {
            text-align: center;
            color: var(--primary-color);
            padding: 1rem 0;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color);
            }
            to {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
            }
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .movie-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-info {
            text-align: center;
            margin-bottom: 10px;
            color: var(--secondary-color);
        }
        .movie-info h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        .iframe-container {
            width: 100%;
            padding-top: 56.25%; /* Relación de aspecto 16:9 */
            position: relative;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90%;
            border: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            border-radius: 15px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
        }
        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            font-size: 14px;
            background-color: var(--primary-color);
            color: var(--background-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-button:hover {
            background-color: var(--secondary-color);
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            .movie-info h2 {
                font-size: 1.5rem;
            }
            .back-button {
                top: 10px;
                left: 10px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            .header p {
                font-size: 0.9rem;
            }
            .movie-info h2 {
                font-size: 1.2rem;
            }
            .movie-info p {
                font-size: 0.9rem;
            }
            .back-button {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
        @media (max-width: 320px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .header p {
                font-size: 0.8rem;
            }
            .movie-info h2 {
                font-size: 1rem;
            }
            .movie-info p {
                font-size: 0.8rem;
            }
            .back-button {
                padding: 4px 8px;
                font-size: 10px;
            }
        }
        @media (min-width: 768px) {
            .movie-container {
                padding: 40px;
            }
            .iframe-container {
                width: 90%;
            }
        }
        @media (min-width: 1024px) {
            .iframe-container {
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="location.href='Peliculas.html';">Volver a Películas</button>
    <div class="header">
        <h1>HRZ TV</h1>
        <p>Reproducir Película</p>
    </div>
    <div class="movie-container" id="movie-container">
        <!-- La información de la película y el iframe se cargarán aquí dinámicamente -->
    </div>
    <footer>
        <p>&copy; 2024 Tecnologia HRZ. Todos los derechos reservados.</p>
    </footer>

    <script>
        window.addEventListener('load', () => {
            const peliculaSeleccionada = JSON.parse(localStorage.getItem('peliculaSeleccionada'));
            if (peliculaSeleccionada) {
                const movieContainer = document.getElementById('movie-container');
                movieContainer.innerHTML = `
                    <div class="movie-info">
                        <h2>${peliculaSeleccionada.titulo}</h2>
                        <p>Año: ${peliculaSeleccionada.año}</p>
                    </div>
                    <div class="iframe-container">
                        <iframe src="${peliculaSeleccionada.enlace}" allowfullscreen></iframe>
                    </div>
                `;
            } else {
                alert('No se ha seleccionado ninguna película');
                window.location.href = 'Peliculas.html';
            }
        });
    </script>
</body>
</html>
