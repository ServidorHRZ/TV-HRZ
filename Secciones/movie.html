<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZ TV - Reproducir Película</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ffffff;
            --background-color: #000000;
        }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(45deg, var(--background-color), #1a1a1a);
            color: var(--secondary-color);
            padding-bottom: 70px;
            overflow-y: auto;
        }
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: calc(100vh - 70px);
            overflow-y: auto;
        }
        .header {
            text-align: center;
            color: var(--primary-color);
            padding: 1rem 0;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color);
            }
            to {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
            }
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .movie-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        .movie-info {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
            margin: 20px 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(20, 20, 20, 0.8));
            padding: 30px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.1);
        }
        .movie-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to right, 
                rgba(0, 0, 0, 0.9) 0%,
                rgba(0, 0, 0, 0.7) 50%,
                rgba(0, 0, 0, 0.4) 100%
            );
            z-index: 1;
        }
        .movie-poster {
            position: relative;
            z-index: 2;
            width: 100%;
            transition: transform 0.3s ease;
        }
        .movie-poster img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }
        .movie-poster:hover img {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(0, 255, 255, 0.2);
        }
        .movie-details {
            position: relative;
            z-index: 2;
            padding: 10px 0;
        }
        .movie-details h2 {
            font-size: 2.8em;
            margin: 0 0 20px 0;
            background: linear-gradient(45deg, var(--primary-color), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .movie-metadata {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            color: var(--primary-color);
            font-size: 1.1em;
            align-items: center;
            justify-content: flex-start;
        }
        .movie-metadata span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .movie-metadata span::before {
            content: '•';
            color: var(--primary-color);
            font-size: 1.5em;
        }
        .movie-metadata span:first-child::before {
            display: none;
        }
        .movie-description {
            font-size: 1.15em;
            line-height: 1.8;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
        }
        .iframe-container {
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            background: #000;
            position: relative;
            width: 100%;
            max-width: 1400px;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
            margin-bottom: 0;
        }
        .back-button {
            display: none;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -2px 10px rgba(0, 255, 255, 0.2);
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--secondary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .nav-item.active {
            color: var(--primary-color);
        }
        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .nav-item span {
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            .movie-container {
                padding: 15px;
            }
            .movie-info {
                grid-template-columns: 1fr;
                padding: 20px;
                gap: 25px;
            }
            .movie-poster {
                max-width: 220px;
                margin: 0 auto;
            }
            .movie-details {
                text-align: left;
            }
            .movie-info h2 {
                font-size: 2em;
                text-align: center;
            }
            .movie-info p {
                font-size: 1.1em;
                text-align: center;
            }
            .iframe-container {
                width: 95%;
                margin-bottom: 30px;
                padding-top: 56.25%;
            }
            .movie-poster {
                max-width: 160px;
            }
            .movie-metadata {
                justify-content: center;
            }
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }
            .header p {
                font-size: 0.9rem;
            }
            .movie-container {
                padding: 10px;
            }
            .movie-info h2 {
                font-size: 1.5rem;
            }
            .movie-info p {
                font-size: 0.9rem;
            }
            .iframe-container {
                width: 100%;
                padding-top: 60%;
                margin-bottom: 25px;
            }
            .movie-poster {
                max-width: 140px;
            }
        }
        @media (max-width: 320px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .header p {
                font-size: 0.8rem;
            }
            .movie-info h2 {
                font-size: 1rem;
            }
            .movie-info p {
                font-size: 0.8rem;
            }
            .back-button {
                padding: 4px 8px;
                font-size: 10px;
            }
        }
        @media (min-width: 769px) {
            .iframe-container {
                width: 90%;
                height: 600px;
                padding-top: 0;
            }

            .iframe-container iframe {
                height: 100%;
            }
        }
        @media (min-width: 1200px) {
            .iframe-container {
                width: 90%;
                height: 700px;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="movie-container" id="movie-container">
            <!-- La información de la película y el iframe se cargarán aquí dinámicamente -->
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="Peliculas.html" class="nav-item active">
            <i class="fas fa-film"></i>
            <span>Películas</span>
        </a>
        <a href="Series.html" class="nav-item">
            <i class="fas fa-tv"></i>
            <span>Series</span>
        </a>
        <a href="TV-Online.html" class="nav-item">
            <i class="fas fa-broadcast-tower"></i>
            <span>TV Online</span>
        </a>
        <a href="Proximos.html" class="nav-item">
            <i class="fas fa-calendar-alt"></i>
            <span>Próximos</span>
        </a>
    </nav>
    <footer>
        <p>&copy; 2024 Tecnologia HRZ. Todos los derechos reservados.</p>
    </footer>

    <script>
        window.addEventListener('load', () => {
            const peliculaSeleccionada = JSON.parse(localStorage.getItem('peliculaSeleccionada'));
            if (peliculaSeleccionada) {
                const movieContainer = document.getElementById('movie-container');
                movieContainer.innerHTML = `
                    <div class="movie-info">
                        <div class="movie-poster">
                            <img src="${peliculaSeleccionada.imagen}" alt="${peliculaSeleccionada.titulo}">
                        </div>
                        <div class="movie-details">
                            <h2>${peliculaSeleccionada.titulo}</h2>
                            <div class="movie-metadata">
                                <span>${peliculaSeleccionada.año}</span>
                            </div>
                            <p class="movie-description">${peliculaSeleccionada.descripcion || 'Descripción no disponible.'}</p>
                        </div>
                    </div>
                    <div class="iframe-container">
                        <iframe 
                            src="${peliculaSeleccionada.enlace}" 
                            allowfullscreen
                            allow="autoplay; fullscreen; encrypted-media"
                            webkitallowfullscreen
                            mozallowfullscreen>
                        </iframe>
                    </div>
                `;
            } else {
                alert('No se ha seleccionado ninguna película');
                window.location.href = 'Peliculas.html';
            }
        });
    </script>
</body>
</html>
